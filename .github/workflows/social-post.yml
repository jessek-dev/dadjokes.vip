name: Daily Social Post

on:
  schedule:
    # Run daily at 14:00 UTC (morning US, afternoon Europe)
    - cron: "0 14 * * *"
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post-joke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          cd scripts
          npm install

      - name: Setup Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          mkdir -p quotes_app
          echo "$FIREBASE_SERVICE_ACCOUNT" > quotes_app/firebase-service-account.json

      - name: Post daily joke to social platforms
        env:
          TWITTER_ENABLED: ${{ secrets.TWITTER_ENABLED }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          BLUESKY_ENABLED: ${{ secrets.BLUESKY_ENABLED }}
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          REDDIT_ENABLED: ${{ secrets.REDDIT_ENABLED }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
        run: |
          cd scripts
          npm run social-post

      - name: Commit posted history
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add scripts/social-posted.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update social posting history for $(date -u +%Y-%m-%d)"
            git push
          fi
